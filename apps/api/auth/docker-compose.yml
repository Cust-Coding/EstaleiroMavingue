version: '3.9'

services:
  backend:
    build: .
    container_name: estaleiro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/estaleiro
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: example
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: estaleiro-db
    restart: always
    environment:
      POSTGRES_DB: estaleiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: